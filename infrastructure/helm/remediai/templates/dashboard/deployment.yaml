apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remediai.fullname" . }}-dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "remediai.name" . }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "remediai.name" . }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.global.imageRegistry }}{{ if .Values.global.imageRegistry }}/{{ end }}{{ .Values.dashboard.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.dashboard.imagePullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.global.secretName | default "remediai-secrets" }}
          env:
          ports:
            - containerPort: 80
          resources:
{{ toYaml .Values.dashboard.resources | indent 12 }}
