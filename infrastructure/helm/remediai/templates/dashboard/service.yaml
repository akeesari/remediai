apiVersion: v1
kind: Service
metadata:
  name: {{ include "remediai.fullname" . }}-dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "remediai.name" . }}
    app.kubernetes.io/component: dashboard
