global:
  registry: remediai.azurecr.io
  imageTag: latest
  workloadIdentityClientId: ""

workloadIdentity:
  clientId: ""
  tenantId: ""

keyvault:
  name: ""
  secretName: ""
  objects:
    postgresPassword: postgres-password
    azureDevopsPat: azure-devops-pat
    azureSearchApiKey: azure-search-api-key
    applicationInsightsConnectionString: applicationinsights-connection-string
    redisConnectionString: redis-connection-string

api:
  image: remediai/api
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 8000

workerAgents:
  image: remediai/worker
  replicas: 1

workerIngestion:
  image: remediai/worker
  schedule: "*/5 * * * *"

dashboard:
  image: remediai/dashboard
  replicas: 1
  port: 80
  ingress:
    enabled: true
    host: remediai.example.com
    tlsSecretName: remediai-tls

config:
  postgresFqdn: ""
  postgresHost: ""
  postgresPort: 5432
  postgresDb: remediai
  postgresUser: remediai
  keyVaultUri: ""
  aiSearchEndpoint: ""
  logLevel: "INFO"

keda:
  enabled: false
  agentWorker:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 15
    cooldownPeriod: 60
    query: "SELECT COUNT(*) FROM incidents WHERE status = 'new'"
    targetQueryValue: "5"
    activationTargetQueryValue: "1"
  ingestionWorker:
    enabled: false
    cronSchedule: "*/5 * * * *"
    timezone: "UTC"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 5
