services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: remediai
      POSTGRES_USER: remediai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remediai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      LOCAL_MODE: ${LOCAL_MODE:-true}
      DATABASE_URL: postgresql+asyncpg://remediai:${POSTGRES_PASSWORD:-change_me_locally}@postgres:5432/remediai
      REDIS_URL: redis://redis:6379/0
      REMEDIAI_PROFILE: ${REMEDIAI_PROFILE:-}
      LLM_PROVIDER_ID: ${LLM_PROVIDER_ID:-}
      RETRIEVAL_PROVIDER_ID: ${RETRIEVAL_PROVIDER_ID:-}
      SCM_PROVIDER_ID: ${SCM_PROVIDER_ID:-}
      TICKET_PROVIDER_ID: ${TICKET_PROVIDER_ID:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1}
      AZURE_DEVOPS_ORG_URL: ${AZURE_DEVOPS_ORG_URL:-}
      AZURE_DEVOPS_PROJECT: ${AZURE_DEVOPS_PROJECT:-}
      AZURE_DEVOPS_PAT: ${AZURE_DEVOPS_PAT:-}
      AZURE_SEARCH_ENDPOINT: ${AZURE_SEARCH_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      APP_ENV: local
      LOCAL_MODE: ${LOCAL_MODE:-true}
      DATABASE_URL: postgresql+asyncpg://remediai:${POSTGRES_PASSWORD:-change_me_locally}@postgres:5432/remediai
      REDIS_URL: redis://redis:6379/0
      REMEDIAI_PROFILE: ${REMEDIAI_PROFILE:-}
      LLM_PROVIDER_ID: ${LLM_PROVIDER_ID:-}
      RETRIEVAL_PROVIDER_ID: ${RETRIEVAL_PROVIDER_ID:-}
      SCM_PROVIDER_ID: ${SCM_PROVIDER_ID:-}
      TICKET_PROVIDER_ID: ${TICKET_PROVIDER_ID:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1}
      AZURE_DEVOPS_ORG_URL: ${AZURE_DEVOPS_ORG_URL:-}
      AZURE_DEVOPS_PROJECT: ${AZURE_DEVOPS_PROJECT:-}
      AZURE_DEVOPS_PAT: ${AZURE_DEVOPS_PAT:-}
      AZURE_SEARCH_ENDPOINT: ${AZURE_SEARCH_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "${DASHBOARD_HOST_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    ports:
      - "${DOCS_HOST_PORT:-3001}:80"

  log-bridge:
    build:
      context: .
      dockerfile: apps/log_bridge/Dockerfile
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-remediai}
      BRIDGE_CONTAINERS: ${BRIDGE_CONTAINERS:-api,worker,dashboard}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
