global:
  imageRegistry: ""
  imageTag: "latest"
  appEnv: "production"
  logLevel: "INFO"

api:
  repository: remediai/api
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 8000
  resources: {}
  env:
    databaseUrl: ""
    redisUrl: ""
    azureServiceBusNamespace: ""
    azureServiceBusConnectionString: ""
    azureOpenAiEndpoint: ""
    azureOpenAiDeployment: "gpt-4o"
    azureSearchEndpoint: ""
    azureSearchApiKey: ""
    azureDevOpsOrgUrl: ""
    azureDevOpsProject: ""
    azureDevOpsPat: ""
    azureMonitorWorkspaceId: ""

worker:
  repository: remediai/worker
  imagePullPolicy: IfNotPresent
  replicas: 1
  resources: {}
  env:
    databaseUrl: ""
    redisUrl: ""
    azureServiceBusNamespace: ""
    azureServiceBusConnectionString: ""
    azureOpenAiEndpoint: ""
    azureOpenAiDeployment: "gpt-4o"
    azureSearchEndpoint: ""
    azureSearchApiKey: ""
    azureDevOpsOrgUrl: ""
    azureDevOpsProject: ""
    azureDevOpsPat: ""
    azureMonitorWorkspaceId: ""

dashboard:
  repository: remediai/dashboard
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 80
  resources: {}

service:
  type: ClusterIP
  port: 8000
