apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "remediai.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "remediai.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: {{ (coalesce .Values.workloadIdentity.clientId .Values.global.workloadIdentityClientId "") | quote }}
    keyvaultName: {{ .Values.keyvault.name | quote }}
    tenantID: {{ .Values.workloadIdentity.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.keyvault.objects.postgresPassword | quote }}
          objectType: secret
        - |
          objectName: {{ .Values.keyvault.objects.azureDevopsPat | quote }}
          objectType: secret
        - |
          objectName: {{ .Values.keyvault.objects.azureSearchApiKey | quote }}
          objectType: secret
        - |
          objectName: {{ .Values.keyvault.objects.applicationInsightsConnectionString | quote }}
          objectType: secret
        - |
          objectName: {{ .Values.keyvault.objects.redisConnectionString | quote }}
          objectType: secret
  secretObjects:
    - secretName: {{ default (printf "%s-secrets" (include "remediai.fullname" .)) .Values.keyvault.secretName }}
      type: Opaque
      data:
        - objectName: {{ .Values.keyvault.objects.postgresPassword | quote }}
          key: POSTGRES_PASSWORD
        - objectName: {{ .Values.keyvault.objects.azureDevopsPat | quote }}
          key: AZURE_DEVOPS_PAT
        - objectName: {{ .Values.keyvault.objects.azureSearchApiKey | quote }}
          key: AZURE_SEARCH_API_KEY
        - objectName: {{ .Values.keyvault.objects.applicationInsightsConnectionString | quote }}
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: {{ .Values.keyvault.objects.redisConnectionString | quote }}
          key: REDIS_URL
