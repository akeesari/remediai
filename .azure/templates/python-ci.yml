parameters:
  - name: step
    type: string

jobs:
  - job: python_${{ parameters.step }}
    displayName: Python - ${{ parameters.step }}
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        displayName: Use Python $(PYTHON_VERSION)
        inputs:
          versionSpec: $(PYTHON_VERSION)

      - script: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --no-root
        displayName: Install Python dependencies

      - ${{ if eq(parameters.step, 'lint') }}:
        - script: |
            poetry run ruff check .
            poetry run ruff format --check .
          displayName: Ruff lint + format check

      - ${{ if eq(parameters.step, 'typecheck') }}:
        - script: poetry run mypy apps/ packages/ --strict
          displayName: mypy strict

      - ${{ if eq(parameters.step, 'test') }}:
        - script: poetry run python scripts/validate_prompt_contracts.py
          displayName: Validate prompt contracts

        - script: |
            mkdir -p results
            poetry run pytest tests/ -x -v --ignore=tests/e2e --junitxml=results/test-results.xml
          displayName: pytest (unit + integration + agent-evals)

        - task: PublishTestResults@2
          displayName: Publish test results
          inputs:
            testResultsFormat: JUnit
            testResultsFiles: results/test-results.xml
            testRunTitle: Python tests
          condition: always()
