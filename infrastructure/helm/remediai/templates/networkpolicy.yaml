apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "remediai.fullname" . }}-allow-same-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
